<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart VPN Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0d0e12;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1a1b20;
            border: 1px solid #2a2b30;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 60px rgba(79, 70, 229, 0.08);
        }
        .logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
        h1 { color: #ffffff; text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { color: #6b7280; text-align: center; font-size: 13px; margin-bottom: 32px; }
        label { display: block; color: #9ca3af; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #121317;
            border: 1px solid #2a2b30;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .footer { color: #4b5563; text-align: center; font-size: 11px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">&#128737;</div>
        <h1>Smart VPN</h1>
        <p class="subtitle">Admin Panel</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ admin_path }}/login">
            <label>Login</label>
            <input type="text" name="username" required autocomplete="username" placeholder="admin">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password" placeholder="········">
            <button type="submit">Sign In</button>
        </form>

        <p class="footer">Smart VPN Panel v2.0</p>
    </div>
</body>
</html>
