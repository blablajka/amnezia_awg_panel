<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amnezia VPN Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f4ff', 100: '#dbe4ff', 200: '#bac8ff',
                            300: '#91a7ff', 400: '#748ffc', 500: '#5c7cfa',
                            600: '#4c6ef5', 700: '#4263eb', 800: '#3b5bdb',
                            900: '#364fc7',
                        },
                        dark: {
                            50: '#c1c2c5', 100: '#a6a7ab', 200: '#909296',
                            300: '#5c5f66', 400: '#373a40', 500: '#2c2e33',
                            600: '#25262b', 700: '#1a1b1e', 800: '#141517',
                            900: '#101113',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(92, 124, 250, 0.15);
            color: #5c7cfa;
        }
        .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .glass {
            background: rgba(37, 38, 43, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark-900 text-dark-50 min-h-screen">

{% block body %}
<div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-dark-800 border-r border-dark-400/30 flex flex-col fixed h-full z-10">
        <!-- Logo -->
        <div class="p-6 border-b border-dark-400/30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                    <i class="fas fa-shield-halved text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">Amnezia VPN</h1>
                    <p class="text-xs text-dark-200">Admin Panel</p>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-1">
            <a href="/dashboard" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line w-5 text-center"></i>Dashboard
            </a>
            <a href="/users" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'users' %}active{% endif %}">
                <i class="fas fa-users w-5 text-center"></i>Пользователи
            </a>
            <a href="/subscriptions" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'subscriptions' %}active{% endif %}">
                <i class="fas fa-key w-5 text-center"></i>Подписки
            </a>
            <a href="/servers" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'servers' %}active{% endif %}">
                <i class="fas fa-server w-5 text-center"></i>Серверы
            </a>
            <a href="/promo-codes" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'promo_codes' %}active{% endif %}">
                <i class="fas fa-tags w-5 text-center"></i>Промокоды
            </a>
            <a href="/stats" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'stats' %}active{% endif %}">
                <i class="fas fa-chart-bar w-5 text-center"></i>Статистика
            </a>
            <a href="/protocols" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'protocols' %}active{% endif %}">
                <i class="fas fa-plug w-5 text-center"></i>Протоколы
            </a>
            <a href="/bridges" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium {% if page == 'bridges' %}active{% endif %}">
                <i class="fas fa-network-wired w-5 text-center"></i>Мосты
            </a>
        </nav>

        <!-- Logout -->
        <div class="p-4 border-t border-dark-400/30">
            <a href="/logout" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-red-400 hover:bg-red-500/10 transition-colors">
                <i class="fas fa-sign-out-alt w-5 text-center"></i>Выйти
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
        {% block content %}{% endblock %}
    </main>
</div>
{% endblock %}

</body>
</html>
